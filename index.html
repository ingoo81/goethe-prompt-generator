<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{--p:#a5c500;--d:#003468;--w:#fef3c7;--wb:#fcd34d;--wt:#92400e;--ib:#eff6ff;--ibb:#bfdbfe;--it:#1e40af;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f8fafc;font-family:'Segoe UI',Arial,sans-serif;}
.gh{background:var(--d);}
.hi{max-width:780px;margin:0 auto;padding:16px 24px;display:flex;align-items:center;gap:16px;}
.lb{display:flex;align-items:center;flex-shrink:0;}
.lg{background:var(--p);color:var(--d);font-size:10px;font-weight:800;letter-spacing:.05em;padding:4px 8px;border-radius:3px 0 0 3px;}
.li{background:white;color:var(--d);font-size:10px;font-weight:800;letter-spacing:.05em;padding:4px 8px;border-radius:0 3px 3px 0;}
.ht{flex:1;}.ht h1{font-size:19px;font-weight:800;color:white;margin-bottom:2px;}
.ht .sub{color:var(--p);font-size:12px;font-weight:500;}
.him{width:72px;height:72px;object-fit:cover;border-radius:50%;flex-shrink:0;border:3px solid rgba(165,197,0,.6);}
.hs{background:linear-gradient(135deg,var(--d) 0%,#005a8e 100%);padding:9px 24px;display:flex;align-items:center;justify-content:center;border-bottom:3px solid var(--p);}
.hs span{color:rgba(255,255,255,.85);font-size:12px;font-style:italic;}
.ww{max-width:780px;margin:0 auto;padding:26px 20px 50px;}
.pp{display:flex;gap:3px;margin-bottom:4px;}
.pip{height:4px;flex:1;border-radius:2px;background:#e2e8f0;transition:background .3s;}
.pip.done{background:var(--p);}.pip.active{background:var(--d);}
.pi{display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:18px;}
.sc{background:white;border-radius:20px;box-shadow:0 4px 24px rgba(0,52,104,.1);border:2px solid #e2e8f0;padding:26px 26px 22px;}
.ey{font-size:11px;font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.st{font-size:19px;font-weight:800;color:var(--d);margin-bottom:5px;}
.sh{font-size:13px;color:#64748b;line-height:1.55;margin-bottom:20px;}
.fg{margin-bottom:14px;}.fg label{display:block;font-size:13px;font-weight:600;color:var(--d);margin-bottom:5px;}
.rq{color:#ef4444;}
input.ti,textarea.ti{width:100%;border:2px solid #e2e8f0;border-radius:10px;padding:10px 13px;font-size:14px;color:#1e293b;background:#f8fafc;font-family:inherit;transition:border-color .18s;}
input.ti:focus,textarea.ti:focus{outline:none;border-color:var(--p);background:white;box-shadow:0 0 0 3px rgba(165,197,0,.15);}
textarea.ti{min-height:85px;resize:vertical;}
.ng{display:flex;flex-direction:column;gap:7px;margin-top:4px;}
.ni{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;border:2px solid #e2e8f0;cursor:pointer;background:#f8fafc;transition:all .15s;}
.ni:hover{border-color:var(--p);background:#f0f8d8;}
.ni.sel{border-color:var(--p);background:#f0f8d8;}
.nb2{background:var(--d);color:white;font-size:12px;font-weight:800;padding:3px 9px;border-radius:6px;min-width:36px;text-align:center;flex-shrink:0;}
.ni.sel .nb2{background:var(--p);color:var(--d);}
.nn{font-size:13px;font-weight:600;color:var(--d);}.nd{font-size:11px;color:#64748b;margin-top:1px;}
.ch{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.chip{padding:7px 15px;border-radius:20px;border:2px solid #e2e8f0;font-size:13px;cursor:pointer;background:#f8fafc;color:#334155;transition:all .15s;user-select:none;font-family:inherit;}
.chip:hover{border-color:var(--p);background:#f0f8d8;}
.chip.sel{background:var(--p);border-color:var(--p);color:var(--d);font-weight:700;}
.chip.cust{border-style:dashed;}
.chip.cust input{background:transparent;border:none;outline:none;font-size:13px;color:inherit;width:110px;font-family:inherit;}
.kchip{padding:10px 14px;border-radius:12px;border:2px solid #e2e8f0;font-size:13px;cursor:pointer;background:#f8fafc;color:#334155;transition:all .15s;user-select:none;font-family:inherit;width:100%;text-align:left;display:flex;flex-direction:column;gap:3px;}
.kchip:hover{border-color:var(--p);background:#f0f8d8;}
.kchip.sel{background:var(--p);border-color:var(--p);color:var(--d);font-weight:700;}
.kchip .kd{font-size:11px;opacity:.75;font-weight:400;}
.rg{display:flex;flex-direction:column;gap:8px;}
.ro{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:12px;border:2px solid #e2e8f0;cursor:pointer;background:#f8fafc;transition:all .15s;}
.ro:hover{border-color:var(--p);background:#f0f8d8;}
.ro.sel{border-color:var(--p);background:#f0f8d8;}
.ro input[type=radio]{margin-top:3px;accent-color:var(--d);flex-shrink:0;}
.rl{font-size:13px;font-weight:600;color:var(--d);}
.rd{font-size:12px;color:#64748b;margin-top:2px;line-height:1.4;}
.av{background:#f0f4f8;border:2px dashed #cbd5e1;border-radius:12px;padding:14px 16px;margin-top:4px;}
.av p{font-size:12px;color:#64748b;line-height:1.5;}
.wb2{background:var(--w);border:1.5px solid var(--wb);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--wt);margin-top:12px;line-height:1.5;}
.nr{display:flex;justify-content:space-between;align-items:center;margin-top:22px;}
.bb{background:white;border:2px solid #e2e8f0;color:#64748b;border-radius:10px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.bb:hover{border-color:#94a3b8;color:#334155;}
.bn{background:var(--d);color:white;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;font-family:inherit;}
.bn:hover{background:#004d8c;transform:translateY(-1px);}
.bn.gen{background:var(--p);color:var(--d);font-size:15px;padding:12px 28px;}
.bn.gen:hover{background:#8fb000;}
.em{font-size:12px;color:#ef4444;text-align:center;min-height:18px;margin-top:8px;}
.lg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px;}
.lc{padding:18px 16px;border-radius:14px;border:2px solid #e2e8f0;cursor:pointer;text-align:center;transition:all .18s;background:#f8fafc;}
.lc:hover{border-color:var(--p);background:#f0f8d8;}
.lc.sel{border:3px solid var(--p);background:#f0f8d8;}
.lc .fl{font-size:30px;margin-bottom:6px;}.lc .ln{font-size:15px;font-weight:700;color:var(--d);}
.lc .lnat{font-size:12px;color:#64748b;margin-top:2px;}
.rb{background:#f0f4f8;border:2px solid #e2e8f0;border-radius:12px;padding:16px 18px;font-size:13px;line-height:1.8;color:#1e293b;max-height:420px;overflow-y:auto;margin-bottom:14px;white-space:pre-wrap;}
.rl2{font-size:11px;font-weight:700;color:var(--d);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 3px;display:block;}
.rv{font-size:13px;color:#334155;line-height:1.6;display:block;}
.rdiv{border:none;border-top:1.5px dashed #cbd5e1;margin:8px 0;}
.cb{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px 20px;background:var(--p);color:var(--d);font-size:14px;font-weight:800;border:none;border-radius:12px;cursor:pointer;transition:all .2s;box-shadow:0 3px 10px rgba(165,197,0,.35);font-family:inherit;}
.cb:hover{background:#8fb000;transform:translateY(-1px);}
.cb.ok{background:#22c55e;color:white;}
.tb{background:var(--ib);border:1.5px solid var(--ibb);border-radius:10px;padding:11px 14px;font-size:12px;color:var(--it);margin-top:14px;line-height:1.5;}
footer{text-align:center;padding:16px;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0;margin-top:10px;}
</style>
</head>

function togChip(key, idx) {
  var sd=L().steps[cur-1];
  var opts=sd.o;
  var val=opts[idx];
  var arr=S[key];
  var i=arr.indexOf(val);
  if(i>=0) arr.splice(i,1); else arr.push(val);
  render();
}

function togKo(idx) {
  var sd=L().steps[cur-1];
  var val=sd.o[idx];
  var i=S.ko.indexOf(val);
  if(i>=0) S.ko.splice(i,1); else S.ko.push(val);
  render();
}

function togArr(key, idx) {
  var sd=L().steps[cur-1];

  var val=arr2[idx];
  var arr=S[key];
  var i=arr.indexOf(val);
  if(i>=0) arr.splice(i,1); else arr.push(val);
  render();

  if(si===0) { S.zs=gv("zs"); S.es=gv("es"); }
  else if(si===2) { S.th=gv("th"); S.au=gv("au"); }

    S.fok=S.fok.filter(function(f){return opts.indexOf(f)>=0;});
    var cv=document.getElementById("fc");
    if(cv&&cv.value.trim()) S.fok.push(cv.value.trim());
  }
  else if(si===4) { S.an=gv("an"); S.as2=gv("as2"); }
  else if(si===5) { var rc=document.getElementById("roc"); if(rc&&rc.value) S.ro=rc.value; }
}

  if(dir===1&&cur===T-1) {
    S={lang:S.lang,fok:[],kf:[],ko:[],nb:[],ha:[]};
    cur=0; render(); return;
  }
  saveStep();
  if(dir===1) {
    var reqs=cur>0&&cur<T-1?(L().steps[cur-1].r||[]):[];
    for(var i=0;i<reqs.length;i++) {
      var k=reqs[i];
      var ok=Array.isArray(S[k])?(S[k].length>0):!!S[k];
      if(!ok) { document.getElementById("em").textContent=lb().req; return; }
    }
  }
  cur=Math.max(0,Math.min(T-1,cur+dir));
  render();
}

function fmtPrompt(p) {
  var lines=p.split("\n");
  var out="";
  for(var i=0;i<lines.length;i++) {
    var line=lines[i];
    if(line==="---") out+="<hr class=\"rdiv\">";
    else if(/^[A-Z\u05D0-\u05EA][^:].{0,35}:$/.test(line.trim())) out+="<span class=\"rl2\">"+esc(line)+"</span>";
    else out+="<span class=\"rv\">"+esc(line)+"</span>";
  }
  return out;
}

function buildPrompt() {
  var isHe=S.lang==="he";
  var lang=S.es||"Deutsch";
  var an=S.an||(isHe?"[\u05E9\u05DD]":"[Name]");
  var as2=S.as2||(isHe?"\u05D7\u05DD":"warmherzig");
  var nObj=null;
  var niv=L().niv;
  for(var i=0;i<niv.length;i++) if(niv[i].c===S.niv) { nObj=niv[i]; break; }
  var L2=[];
  if(isHe) {
    L2.push("\u05D4\u05E6\u05D2\u05D4 \u05E2\u05E6\u05DE\u05D9\u05EA:");
    L2.push("\u05D4\u05E6\u05D2 \u05E2\u05E6\u05DE\u05DA \u05D1\u05E9\u05DD \""+an+"\" \u05D1\u05D0\u05D5\u05E4\u05DF "+as2+". \u05E1\u05E4\u05E8 \u05DE\u05E9\u05D4\u05D5 \u05E7\u05E6\u05E8 \u05D5\u05E2\u05D1\u05D5\u05E8 \u05DC\u05DE\u05E9\u05D9\u05DE\u05D4.");
    L2.push("---");
    L2.push("\u05EA\u05E4\u05E7\u05D9\u05D3 \u05D5\u05E9\u05E4\u05D4:");
    L2.push("\u05E0\u05D4\u05DC \u05D0\u05EA \u05D4\u05E9\u05D9\u05D7\u05D4 \u05D1"+(S.zs||"[\u05E9\u05E4\u05EA \u05D4\u05DE\u05D8\u05E8\u05D4]")+". \u05DC\u05D4\u05E1\u05D1\u05E8\u05D5\u05EA \u2013 \u05D4\u05E9\u05EA\u05DE\u05E9 \u05D1"+lang+".");
    if(nObj) L2.push("\u05E8\u05DE\u05EA \u05D4\u05E9\u05E4\u05D4: "+nObj.c+" \u2013 "+nObj.n+". "+nObj.d);
    L2.push("---");
    L2.push("\u05E0\u05D5\u05E9\u05D0 \u05D5\u05DE\u05E9\u05D9\u05DE\u05D4:");
    L2.push("\u05E0\u05D5\u05E9\u05D0: "+(S.th||""));
    if(S.au) L2.push("\u05DE\u05E9\u05D9\u05DE\u05D4: "+S.au);
    if(S.fok.length){L2.push("---");L2.push("\u05DE\u05D5\u05E7\u05D3 \u05D4\u05D0\u05D9\u05DE\u05D5\u05DF:");L2.push(S.fok.join(", "));}
    if(S.ro){L2.push("---");L2.push("\u05EA\u05E4\u05E7\u05D9\u05D3\u05DA:");L2.push(S.ro);}
    if(S.di){L2.push("---");L2.push("\u05D0\u05D5\u05E4\u05DF \u05D4\u05D3\u05D9\u05D0\u05DC\u05D5\u05D2:");L2.push(S.di);}
    if(S.ko.length){L2.push("---");L2.push("\u05D0\u05D5\u05E4\u05DF \u05D4\u05EA\u05D9\u05E7\u05D5\u05DF:");L2.push(S.ko.join(", "));}
    if(S.kf.length){L2.push("---");L2.push("\u05DE\u05D5\u05E7\u05D3 \u05D4\u05EA\u05D9\u05E7\u05D5\u05DF:");L2.push(S.kf.join(", "));}
    if(S.nb.length){L2.push("---");L2.push("\u05E2\u05D9\u05D1\u05D5\u05D3:");L2.push(S.nb.join(" / "));}
    if(S.ha.length){L2.push("---");L2.push("\u05E6\u05E2\u05D3\u05D9\u05DD \u05D4\u05D1\u05D0\u05D9\u05DD:");L2.push(S.ha.join(" / "));}
    L2.push("---");
    L2.push("\u05D4\u05EA\u05D7\u05DC \u05D0\u05EA \u05D4\u05E9\u05D9\u05D7\u05D4 \u05E2\u05DD \u05D4\u05E6\u05D2\u05D4 \u05E2\u05E6\u05DE\u05D9\u05EA \u05DB"+an+".");
  } else {
    L2.push("VORSTELLUNG:");
    L2.push("Stell dich als \""+an+"\" vor \u2013 "+as2+". Erzähle kurz etwas, das zu deiner Rolle passt, und leite dann zur Aufgabe über.");
    L2.push("---");
    L2.push("ROLLE & SPRACHE:");
    L2.push("Führe dieses Gespräch auf "+(S.zs||"[Zielsprache]")+". Für Erklärungen verwende "+lang+".");
    if(nObj) L2.push("Mein Sprachniveau: "+nObj.c+" \u2013 "+nObj.n+". "+nObj.d);
    L2.push("---");
    L2.push("THEMA & AUFGABE:");
    L2.push("Thema: "+(S.th||"[Thema]"));
    if(S.au) L2.push("Aufgabe: "+S.au);
    if(S.fok.length){L2.push("---");L2.push("TRAININGSFOKUS:");L2.push("Achte auf: "+S.fok.join(", ")+".");}
    if(S.ro){L2.push("---");L2.push("DEINE ROLLE:");L2.push(S.ro);}
    if(S.di){L2.push("---");L2.push("DIALOGVERHALTEN:");L2.push(S.di);}
    if(S.ko.length){L2.push("---");L2.push("KORREKTURVERHALTEN:");L2.push(S.ko.join(", "));}
    if(S.kf.length){L2.push("---");L2.push("KORREKTURFOKUS:");L2.push(S.kf.join(", "));}
    if(S.nb.length){L2.push("---");L2.push("NACHBEREITUNG:");L2.push(S.nb.join(" / "));}
    if(S.ha.length){L2.push("---");L2.push("NÄCHSTE SCHRITTE:");L2.push(S.ha.join(" / "));}
    L2.push("---");
    L2.push("Wichtig: Ich kann jederzeit um Anpassungen bitten. Reagiere flexibel.");
    L2.push("Beginne jetzt mit deiner Vorstellung als "+an+".");
  }
  return L2.join("\n");
}

function doCopy() {
  navigator.clipboard.writeText(S.prompt||"").then(function() {
    var b=document.getElementById("cpb");
    document.getElementById("cpi").textContent="\u2713";
    document.getElementById("cpl").textContent=lb().cpd;
    b.classList.add("ok");
    setTimeout(function(){b.classList.remove("ok");document.getElementById("cpi").textContent="\uD83D\uDCCB";document.getElementById("cpl").textContent=lb().cpy;},2500);
  });
}

render();
</script>
